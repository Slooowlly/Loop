<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arquivo historico da equipe - style lab 48%</title>
  <style>
    :root {
      --bg: #07101d;
      --panel: rgba(12, 20, 33, 0.88);
      --panel-strong: rgba(9, 15, 26, 0.97);
      --line: rgba(255, 255, 255, 0.11);
      --line-soft: rgba(255, 255, 255, 0.07);
      --text: #eef6ff;
      --muted: #8fa2b8;
      --soft: #c7d5e6;
      --blue: #58a6ff;
      --green: #5ee7a8;
      --yellow: #f2c46d;
      --red: #ff6b6b;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 14% 18%, rgba(88, 166, 255, 0.18), transparent 26rem),
        radial-gradient(circle at 88% 8%, rgba(94, 231, 168, 0.10), transparent 24rem),
        linear-gradient(145deg, #040812 0%, var(--bg) 54%, #02050b 100%);
      color: var(--text);
      font-family: "Bahnschrift", "Aptos", "Segoe UI", sans-serif;
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 30px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025)),
        var(--panel);
      padding: 24px;
      box-shadow: 0 22px 70px var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(30px, 5vw, 46px);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .copy {
      max-width: 720px;
      margin-bottom: 0;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.65;
    }

    .variant-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      padding: 8px;
    }

    .variant-tabs button {
      border: 1px solid transparent;
      border-radius: 17px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .variant-tabs button.active {
      border-color: rgba(88, 166, 255, 0.32);
      background: rgba(88, 166, 255, 0.12);
      color: var(--blue);
    }

    .hint {
      border: 1px solid rgba(88, 166, 255, 0.28);
      border-radius: 999px;
      background: rgba(88, 166, 255, 0.10);
      padding: 10px 14px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .table-card {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 22px 70px var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    th {
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    td {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line-soft);
      color: var(--soft);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .team-name {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      padding: 0;
      font-weight: 800;
    }

    .team-name:hover {
      color: var(--blue);
    }

    .team-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--team);
      box-shadow: 0 0 18px var(--team);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      padding: 5px 9px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .overlay.open {
      pointer-events: auto;
      opacity: 1;
    }

    .backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      background: rgba(0, 0, 0, 0.30);
      backdrop-filter: blur(2px);
      cursor: pointer;
    }

    .drawer {
      position: absolute;
      inset: 0 auto 0 0;
      width: min(48vw, 720px);
      background:
        radial-gradient(circle at 10% 4%, rgba(88, 166, 255, 0.18), transparent 17rem),
        linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.02)),
        var(--panel-strong);
      border-right: 1px solid var(--line);
      box-shadow: 28px 0 70px rgba(0, 0, 0, 0.44);
      transform: translateX(-104%);
      transition: transform 260ms cubic-bezier(.2,.8,.2,1);
      overflow-y: auto;
    }

    .overlay.open .drawer {
      transform: translateX(0);
    }

    .team-stripe {
      height: 5px;
      background: linear-gradient(90deg, var(--team), rgba(255,255,255,0.1));
    }

    .drawer-inner {
      padding: 22px;
    }

    .close {
      position: absolute;
      top: 17px;
      right: 17px;
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      cursor: pointer;
      z-index: 2;
    }

    .close:hover {
      color: var(--text);
      background: rgba(255,255,255,0.09);
    }

    .drawer-header {
      padding-right: 42px;
    }

    .drawer-header h2 {
      margin: 8px 0 7px;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .meta-row,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-top: 18px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 17px;
      background: rgba(255,255,255,0.045);
      padding: 12px;
    }

    .stat-card span,
    .label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .stat-card strong {
      display: block;
      margin-top: 8px;
      color: var(--text);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 20px;
    }

    .section {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,0.035);
      padding: 16px;
    }

    .section h3 {
      margin-bottom: 13px;
      color: var(--blue);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .trophy {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      border-bottom: 1px solid var(--line-soft);
      padding: 0 0 11px;
      margin-bottom: 11px;
    }

    .trophy:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .trophy strong {
      display: block;
      color: var(--text);
      font-size: 14px;
    }

    .trophy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .year {
      color: var(--yellow);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      font-weight: 900;
    }

    .timeline {
      display: grid;
      gap: 0;
    }

    .event {
      position: relative;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      padding-bottom: 14px;
    }

    .event:before {
      content: "";
      position: absolute;
      left: 53px;
      top: 4px;
      bottom: -4px;
      width: 1px;
      background: var(--line);
    }

    .event:last-child:before {
      display: none;
    }

    .event-year {
      color: var(--yellow);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      font-weight: 900;
    }

    .event-body {
      position: relative;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.55;
    }

    .event-body:before {
      content: "";
      position: absolute;
      left: -17px;
      top: 4px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--team);
      box-shadow: 0 0 16px var(--team);
    }

    .season-table {
      width: 100%;
      font-size: 13px;
    }

    .season-table td,
    .season-table th {
      padding: 8px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .season-table th {
      color: var(--muted);
      font-size: 9px;
    }

    .season-table td:last-child,
    .season-table th:last-child {
      text-align: right;
    }

    .variant-b .legacy-score {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      margin-top: 18px;
      border: 1px solid rgba(88, 166, 255, 0.28);
      border-radius: 22px;
      background: rgba(88, 166, 255, 0.10);
      padding: 14px;
    }

    .legacy-number {
      color: var(--yellow);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }

    .variant-c .archive-cover {
      margin: -22px -22px 18px;
      padding: 28px 22px 22px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--team) 30%, transparent), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--line);
    }

    .variant-c .record-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border-bottom: 1px solid var(--line-soft);
      padding: 10px 0;
    }

    .variant-c .record-card:last-child {
      border-bottom: 0;
    }

    .variant-c .record-card span em {
      color: var(--yellow);
      font-style: normal;
      letter-spacing: 0.08em;
    }

    .record-scope {
      margin: -2px 0 10px;
      border: 1px solid rgba(88, 166, 255, 0.22);
      border-radius: 14px;
      background: rgba(88, 166, 255, 0.08);
      padding: 9px 10px;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.5;
    }

    .record-scope strong {
      color: var(--blue);
    }

    .title-category-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .title-category {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: rgba(255,255,255,0.035);
      padding: 9px 10px;
    }

    .title-category strong {
      color: var(--text);
      font-size: 13px;
    }

    .title-category span {
      color: var(--yellow);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      font-weight: 900;
    }

    .category-path {
      display: grid;
      gap: 10px;
    }

    .category-step {
      position: relative;
      border-left: 3px solid var(--cat);
      border-radius: 16px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--cat) 18%, transparent), rgba(255,255,255,0.025));
      padding: 10px 12px;
    }

    .category-step strong {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      font-size: 13px;
    }

    .category-step span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .category-years {
      color: var(--cat);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .archive-tabs {
      display: flex;
      gap: 6px;
      margin: 14px 0 16px;
      overflow-x: auto;
      padding: 2px 0 4px;
    }

    .archive-tabs button {
      flex: 0 0 auto;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,0.035);
      color: var(--muted);
      cursor: pointer;
      padding: 7px 10px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .archive-tabs button.active {
      border-color: color-mix(in srgb, var(--team) 55%, transparent);
      background: color-mix(in srgb, var(--team) 18%, transparent);
      color: var(--text);
    }

    .archive-panel {
      display: none;
    }

    .archive-panel.active {
      display: block;
      animation: panelIn 180ms ease both;
    }

    .variant-c .archive-panel > .section {
      margin-top: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    .variant-c .archive-panel > .section + .section {
      margin-top: 18px;
      border-top: 1px solid var(--line-soft);
      padding-top: 16px;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .info-grid {
      display: grid;
      gap: 10px;
    }

    .info-card {
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      background: rgba(255,255,255,0.035);
      padding: 11px 12px;
    }

    .info-card .info-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .info-card strong {
      color: var(--text);
      font-size: 14px;
    }

    .info-card small {
      color: var(--yellow);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .info-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .metric-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 10px;
    }

    .mini-metric {
      border: 1px solid var(--line-soft);
      border-radius: 15px;
      background: rgba(255,255,255,0.03);
      padding: 10px;
    }

    .mini-metric span {
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .mini-metric strong {
      display: block;
      margin-top: 6px;
      color: var(--text);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 16px;
    }

    .narrative-card {
      border: 1px solid color-mix(in srgb, var(--team) 34%, transparent);
      border-radius: 18px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--team) 14%, transparent), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.035);
      padding: 13px;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.58;
    }

    .narrative-card strong {
      color: var(--text);
    }

    .rival-card {
      border: 1px solid rgba(242, 196, 109, 0.28);
      border-radius: 18px;
      background: rgba(242, 196, 109, 0.08);
      padding: 13px;
    }

    .rival-card .versus {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .rival-card .versus span {
      color: var(--yellow);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .rival-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .identity-board {
      display: grid;
      gap: 10px;
    }

    .identity-profile-card {
      border: 1px solid color-mix(in srgb, var(--team) 38%, transparent);
      border-radius: 22px;
      background:
        radial-gradient(circle at 10% 8%, color-mix(in srgb, var(--team) 24%, transparent), transparent 12rem),
        linear-gradient(145deg, rgba(255,255,255,0.065), rgba(255,255,255,0.025));
      padding: 15px;
    }

    .identity-profile-card span,
    .identity-stage span,
    .identity-feature span {
      display: block;
      color: var(--muted);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .identity-profile-card strong {
      display: block;
      margin-top: 7px;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .identity-profile-card p {
      margin: 9px 0 0;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.55;
    }

    .identity-journey {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 9px;
      align-items: stretch;
    }

    .identity-stage,
    .identity-feature {
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: rgba(255,255,255,0.035);
      padding: 12px;
    }

    .identity-stage strong,
    .identity-feature strong {
      display: block;
      margin-top: 7px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.2;
    }

    .identity-stage small,
    .identity-feature p {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .identity-arrow {
      display: grid;
      width: 30px;
      place-items: center;
      color: var(--team);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-weight: 900;
    }

    .identity-feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .identity-feature.rival {
      border-color: rgba(242, 196, 109, 0.26);
      background: rgba(242, 196, 109, 0.075);
    }

    .identity-feature.rival strong {
      color: var(--yellow);
    }

    .identity-feature.driver {
      border-color: color-mix(in srgb, var(--team) 30%, transparent);
    }

    @media (max-width: 1100px) {
      .identity-journey,
      .identity-feature-grid {
        grid-template-columns: 1fr;
      }

      .identity-arrow {
        display: none;
      }
    }

    .finance-board {
      display: grid;
      gap: 10px;
    }

    .finance-highlight {
      border: 1px solid rgba(94, 231, 168, 0.24);
      border-radius: 18px;
      background: rgba(94, 231, 168, 0.08);
      padding: 13px;
    }

    .finance-highlight span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .finance-highlight strong {
      display: block;
      margin-top: 7px;
      color: var(--green);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 22px;
    }

    .finance-highlight p {
      margin: 7px 0 0;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.5;
    }

    .management-board {
      display: grid;
      gap: 10px;
    }

    .management-hero {
      border: 1px solid rgba(94, 231, 168, 0.24);
      border-radius: 22px;
      background:
        radial-gradient(circle at 12% 10%, rgba(94, 231, 168, 0.16), transparent 12rem),
        linear-gradient(145deg, rgba(94, 231, 168, 0.075), rgba(255,255,255,0.025));
      padding: 15px;
    }

    .management-hero span,
    .management-node span,
    .management-kpi span {
      display: block;
      color: var(--muted);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .management-hero strong {
      display: block;
      margin-top: 7px;
      color: var(--green);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 24px;
      line-height: 1;
    }

    .management-hero p,
    .management-node p,
    .management-kpi p {
      margin: 8px 0 0;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.5;
    }

    .management-range {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 9px;
      align-items: stretch;
    }

      border-color: rgba(255, 107, 107, 0.24);
      background: rgba(255, 107, 107, 0.065);

      color: var(--red);

      place-items: center;
      color: var(--muted);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-weight: 900;
    }

    .management-kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .management-kpi.investment {
      grid-column: 1 / -1;
      border-color: color-mix(in srgb, var(--team) 30%, transparent);
    }

          ${team.categoryPath.map(([category, years, detail, color]) => `
            <div class="route-stop" style="--cat: ${color}">
              <div class="route-dot"></div>
              <div>
                <strong>${category}<span>${years}</span></strong>
                <p>${detail}</p>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function infoCard(label, value, detail = "") {
      return `
        <div class="info-card">
          <div class="info-top">
            <strong>${label}</strong>
            <small>${value}</small>
          </div>
          ${detail ? `<p>${detail}</p>` : ""}
        </div>
      `;
    }

    function tabButton(id, label, active = false) {
      return `<button class="${active ? "active" : ""}" type="button" data-archive-tab="${id}">${label}</button>`;
    }

    function archivePanel(id, content, active = false) {
      return `<div class="archive-panel ${active ? "active" : ""}" data-archive-panel="${id}">${content}</div>`;
    }

    function commonHeader(team) {
      return `
        <header class="drawer-header">
          <p class="eyebrow">Arquivo historico</p>
          <h2 id="drawerTitle">${team.name}</h2>
          <p class="copy">${team.flag} | Fundada em ${team.founded}</p>
          <div class="meta-row">
            <span class="tag">${team.state}</span>
            <span class="tag">Carro nivel ${team.car}</span>
            <span class="tag">${team.points} pontos atuais</span>
          </div>
        </header>
      `;
    }

    function renderVariantA(team) {
      return `
        <div class="variant-a">
          ${commonHeader(team)}
          <section class="stat-grid">
            <div class="stat-card"><span>Titulos</span><strong>${team.titles}</strong></div>
            <div class="stat-card"><span>Vitorias</span><strong>${team.wins}</strong></div>
            <div class="stat-card"><span>Podios</span><strong>${team.podiums}</strong></div>
          </section>
          <section class="section"><h3>Sala de trofeus</h3>${trophyList(team)}</section>
          <section class="section"><h3>Linha do tempo</h3>${timeline(team)}</section>
        </div>
      `;
    }

    function renderVariantB(team) {
      return `
        <div class="variant-b">
          ${commonHeader(team)}
          <section class="legacy-score">
            <div class="legacy-number">${team.legacy}</div>
            <div>
              <span class="label">Indice de legado</span>
              <p class="copy">Leitura rapida combinando titulos, vitorias, podiums e consistencia recente.</p>
            </div>
          </section>
          <section class="section"><h3>Melhores temporadas</h3>${seasonsTable(team)}</section>
          <section class="section"><h3>Conquistas principais</h3>${trophyList(team)}</section>
        </div>

    }

    function renderVariantC(team) {
      return `
        <div class="variant-c">
          <section class="archive-cover">

              <span class="tag">${team.state}</span>

          </section>
          <nav class="archive-tabs" aria-label="Abas do arquivo compacto">
            ${tabButton("summary", "Resumo", true)}
            ${tabButton("sport", "Esportivo")}

            ${tabButton("movement", "Categorias")}

          ${archivePanel("summary", `
            <section class="section">
              <h3>Resumo historico</h3>
              <p class="record-scope">

              </p>
            ${recordCard("Titulos", team.records.titles)}
            ${titleCategories(team)}
            ${recordCard("Vitorias", team.records.wins)}
            ${recordCard("Podios", team.records.podiums)}
            ${recordCard("Taxa de podio", team.records.podiumRate)}
            ${recordCard("Taxa de vitoria", team.records.winRate)}
            ${recordCard("Melhor ano", team.records.bestYear)}
          </section>
        `, true)}

          ${archivePanel("sport", `
            <section class="section">
              <h3>Historico esportivo</h3>
              <div class="info-grid">

                ${infoCard("Melhor sequencia", team.sport.bestStreak)}
              </div>
              <div class="metric-pair">
                <div class="mini-metric"><span>Taxa de podio</span><strong>${team.sport.podiumRate}</strong></div>

              </div>
            </section>
            <section class="section"><h3>Momentos-chave</h3>${timeline(team)}</section>

          ${archivePanel("identity", `
            <section class="section">

                <div class="identity-profile-card">

                <div class="identity-journey">

                    <span>Categoria de origem</span>

                <div class="identity-feature-grid">
                  <div class="identity-feature rival">
                    <span>Maior rival historico</span>

                  <div class="identity-feature driver">
                    <span>Piloto simbolo</span>
                    <strong>${team.identity.symbolDriver}</strong>
                    <p>${team.identity.symbolDriverDetail}</p>
                  </div>
                </div>
              </div>
            </section>
          `)}

          ${archivePanel("finance", `
            <section class="section">
              <h3>Gestao e dinheiro</h3>
              <div class="management-board">
                <div class="management-hero">
                  <span>Saude da operacao</span>
                  <strong>${team.finance.efficiency}</strong>
                  <p>${team.finance.summary}</p>
                </div>
                <div class="management-range">
                  <div class="management-node peak">
                    <span>Maior saldo historico</span>
                    <strong>${team.finance.peakCash}</strong>

                  </div>
                  <div class="management-arrow">&harr;</div>
                  <div class="management-node crisis">
                    <span>Pior crise financeira</span>
                    <strong>${team.finance.worstCrisis}</strong>
                    <p>${team.finance.worstCrisisDetail}</p>
                  </div>
                </div>
                <div class="management-kpi-grid">
                  <div class="management-kpi">
                    <span>Anos saudaveis</span>
                    <strong>${team.finance.healthyYears}</strong>
                    <p>${team.finance.healthyYearsDetail}</p>
                  </div>
                  <div class="management-kpi">
                    <span>Eficiencia</span>
                    <strong>${team.finance.efficiency}</strong>
                    <p>${team.finance.efficiencyDetail}</p>
                  </div>
                  <div class="management-kpi">
                    <span>Saldo recorde</span>
                    <strong>${team.finance.peakCash}</strong>
                    <p>Melhor folga ja registrada pela operacao.</p>
                  </div>
                  <div class="management-kpi investment">
                    <span>Maior investimento tecnico</span>
                    <strong>${team.finance.biggestInvestment}</strong>
                    <p>${team.finance.investmentDetail}</p>

          `)}

          ${archivePanel("movement", `
            <section class="section">
              <h3>Movimento por categorias</h3>
              <div class="metric-pair">
                <div class="mini-metric"><span>Promocoes</span><strong>${team.movement.promotions}</strong></div>
                <div class="mini-metric"><span>Rebaixamentos</span><strong>${team.movement.relegations}</strong></div>
              </div>
              <div class="info-grid" style="margin-top: 10px">
                ${infoCard("Tempo por categoria", team.movement.timeByCategory)}
                ${infoCard("Melhor categoria", team.movement.bestCategory)}
                ${infoCard("Categoria mais dificil", team.movement.hardestCategory)}
              </div>
            </section>
            <section class="section"><h3>Passagem por categorias</h3>${categoryPath(team)}</section>
          `)}
        </div>
      `;
    }

    function renderVariantD(team) {
      return `
        <div class="variant-d">
          <section class="alt-hero">
            <p class="eyebrow">Placar executivo</p>
            <h2 id="drawerTitle">${team.name}</h2>
            <p class="alt-note">${team.flag} Fundada em ${team.founded}. ${team.identity.summary}</p>
          </section>

          <nav class="archive-tabs" aria-label="Abas do placar executivo">
            ${tabButton("dashboard", "Placar", true)}
            ${tabButton("sport", "Esportivo")}
            ${tabButton("identity", "Identidade")}
            ${tabButton("finance", "Gestao")}
            ${tabButton("movement", "Categorias")}
          </nav>

          ${archivePanel("dashboard", `
            <div class="record-strip">
              ${recordPill("Titulos", team.records.titles)}
              ${recordPill("Vitorias", team.records.wins)}
              ${recordPill("Podios", team.records.podiums)}

                <h3>Resumo de gestao</h3>

                  ${ledgerRow("Maior saldo", team.finance.peakCash)}
                  ${ledgerRow("Eficiencia", team.finance.efficiency)}
                  ${ledgerRow("Estado", team.state)}
                </div>
              </section>
            </div>
          `, true)}

          ${archivePanel("sport", `
            <section class="board-card">
              <h3>Resumo esportivo</h3>
              <div class="ledger-list">
                ${ledgerRow("Temporadas", team.sport.seasons)}
                ${ledgerRow("Sequencia atual", team.sport.currentStreak)}
                ${ledgerRow("Melhor sequencia", team.sport.bestStreak)}
                ${ledgerRow("Taxa de podio", team.sport.podiumRate)}
                ${ledgerRow("Taxa de vitoria", team.sport.winRate)}
              </div>
            </section>
            <section class="board-card" style="margin-top: 10px">
              <h3>Momentos-chave</h3>
              ${timeline(team)}
            </section>

          ${archivePanel("identity", `
            <section class="board-card">
              <h3>Identidade competitiva</h3>
              <p class="alt-note"><strong>${team.identity.profile}.</strong> ${team.identity.summary}</p>
              <div class="ledger-list" style="margin-top: 10px">
                ${ledgerRow("Origem", team.identity.origin)}
                ${ledgerRow("Atual", team.identity.current)}
                ${ledgerRow("Piloto simbolo", team.identity.symbolDriver)}
                ${ledgerRow("Rival", `${team.identity.rival.name} - ${team.identity.rival.currentCategory}`)}
              </div>
            </section>
          `)}

          ${archivePanel("finance", `
            <section class="board-card">
              <h3>Gestao e dinheiro</h3>
              <p class="alt-note">${team.finance.summary}</p>
              <div class="ledger-list" style="margin-top: 10px">
                ${ledgerRow("Maior saldo", team.finance.peakCash)}
                ${ledgerRow("Pior crise", team.finance.worstCrisis)}
                ${ledgerRow("Anos saudaveis", team.finance.healthyYears)}
                ${ledgerRow("Eficiencia", team.finance.efficiency)}
                ${ledgerRow("Investimento tecnico", team.finance.biggestInvestment)}
              </div>
            </section>
          `)}

          ${archivePanel("movement", `
            <section class="board-card">
              <h3>Passagem por categorias</h3>
              ${categoryPath(team)}
            </section>
          `)}
        </div>
      `;
    }

    function renderVariantE(team) {
      return `
        <div class="variant-e">
          <section class="alt-hero">
            <p class="eyebrow">Mapa de categorias</p>
            <h2 id="drawerTitle">${team.name}</h2>
            <p class="alt-note">Esta versao coloca a trajetoria da equipe primeiro, como se o arquivo historico fosse um mapa de carreira por carro/grupo.</p>
          </section>

          <nav class="archive-tabs" aria-label="Abas do mapa de categorias">
            ${tabButton("map", "Mapa", true)}
            ${tabButton("records", "Records")}
            ${tabButton("identity", "Identidade")}
            ${tabButton("finance", "Gestao")}
          </nav>

          ${archivePanel("map", `
            ${routeMap(team)}
            <section class="board-card" style="margin-top: 10px">
              <h3>Movimento</h3>
              <div class="ledger-list">
                ${ledgerRow("Promocoes", team.movement.promotions)}
                ${ledgerRow("Rebaixamentos", team.movement.relegations)}
                ${ledgerRow("Tempo por categoria", team.movement.timeByCategory)}
                ${ledgerRow("Melhor categoria", team.movement.bestCategory)}
                ${ledgerRow("Categoria dificil", team.movement.hardestCategory)}
              </div>
            </section>
          `, true)}

          ${archivePanel("records", `
            <p class="chapter-title">Records dentro de ${team.recordScope}</p>
            <div class="record-strip">
              ${recordPill("Titulos", team.records.titles)}
              ${recordPill("Vitorias", team.records.wins)}
              ${recordPill("Podios", team.records.podiums)}
              ${recordPill("Taxa podio", team.records.podiumRate)}
              ${recordPill("Taxa vitoria", team.records.winRate)}
              ${recordPill("Melhor ano", team.records.bestYear)}
            </div>
            <section class="board-card" style="margin-top: 10px">
              <h3>Titulos por categoria</h3>
              ${titleCategories(team)}
            </section>
          `)}

          ${archivePanel("identity", `
            <section class="board-card">
              <h3>Identidade</h3>
              <p class="alt-note"><strong>${team.identity.profile}.</strong> ${team.identity.summary}</p>
              <div class="ledger-list" style="margin-top: 10px">
                ${ledgerRow("Origem", team.identity.origin)}
                ${ledgerRow("Atual", team.identity.current)}
                ${ledgerRow("Rival historico", `${team.identity.rival.name} - ${team.identity.rival.currentCategory}`)}
                ${ledgerRow("Piloto simbolo", team.identity.symbolDriver)}
              </div>
            </section>
          `)}

          ${archivePanel("finance", `
            <section class="board-card">
              <h3>Gestao</h3>
              <p class="alt-note">${team.finance.summary}</p>
              <div class="record-strip">
                <div class="record-pill"><span>Maior saldo</span><strong>${team.finance.peakCash}</strong></div>
                <div class="record-pill"><span>Pior crise</span><strong>${team.finance.worstCrisis}</strong></div>
                <div class="record-pill"><span>Eficiencia</span><strong>${team.finance.efficiency}</strong></div>
                <div class="record-pill"><span>Anos saudaveis</span><strong>${team.finance.healthyYears}</strong></div>
              </div>
            </section>
          `)}
        </div>
      `;
    }

    function renderVariantF(team) {
      return `
        <div class="variant-f">
          <section class="alt-hero">
            <p class="eyebrow">Dossie de gestao</p>
            <h2 id="drawerTitle">${team.name}</h2>
            <p class="alt-note">Aqui a leitura financeira e operacional ganha mais peso, sem esconder o historico esportivo.</p>
          </section>

          <nav class="archive-tabs" aria-label="Abas do dossie de gestao">
            ${tabButton("finance", "Gestao", true)}
            ${tabButton("records", "Records")}
            ${tabButton("sport", "Esportivo")}
            ${tabButton("identity", "Identidade")}
            ${tabButton("movement", "Categorias")}
          </nav>

          ${archivePanel("finance", `
            <div class="executive-grid">
              <div class="executive-callout">
                <span>Leitura financeira</span>
                <strong>${team.finance.peakCash}</strong>
                <p>${team.finance.summary}</p>
              </div>
              <section class="board-card">
                <h3>Risco e eficiencia</h3>
                <div class="ledger-list">
                  ${ledgerRow("Pior crise", team.finance.worstCrisis)}
                  ${ledgerRow("Anos saudaveis", team.finance.healthyYears)}
                  ${ledgerRow("Eficiencia", team.finance.efficiency)}
                  ${ledgerRow("Maior investimento", team.finance.biggestInvestment)}
                </div>
              </section>
            </div>
          `, true)}

          ${archivePanel("records", `
            <p class="chapter-title">Records esportivos</p>
            <div class="record-strip">
              ${recordPill("Titulos", team.records.titles)}
              ${recordPill("Vitorias", team.records.wins)}
              ${recordPill("Podios", team.records.podiums)}
              ${recordPill("Taxa podio", team.records.podiumRate)}
              ${recordPill("Taxa vitoria", team.records.winRate)}
              ${recordPill("Melhor ano", team.records.bestYear)}
            </div>
          `)}

          ${archivePanel("sport", `
            <section class="board-card">
              <h3>Esportivo</h3>
              <div class="ledger-list">
                ${ledgerRow("Temporadas", team.sport.seasons)}
                ${ledgerRow("Sequencia atual", team.sport.currentStreak)}
                ${ledgerRow("Melhor sequencia", team.sport.bestStreak)}
                ${ledgerRow("Melhor categoria", team.movement.bestCategory)}
                ${ledgerRow("Mais dificil", team.movement.hardestCategory)}
              </div>
            </section>
            <section class="board-card" style="margin-top: 10px">${timeline(team)}</section>
          `)}

          ${archivePanel("identity", `
            <section class="board-card">
              <h3>Identidade</h3>
              <p class="alt-note"><strong>${team.identity.profile}.</strong> ${team.identity.summary}</p>
              <div class="ledger-list" style="margin-top: 10px">
                ${ledgerRow("Origem", team.identity.origin)}
                ${ledgerRow("Atual", team.identity.current)}
                ${ledgerRow("Rival", `${team.identity.rival.name} - ${team.identity.rival.currentCategory}`)}
                ${ledgerRow("Piloto simbolo", team.identity.symbolDriver)}
              </div>
            </section>
          `)}

          ${archivePanel("movement", `
            <section class="board-card">
              <h3>Linha por categorias</h3>
              ${categoryPath(team)}
            </section>
          `)}
        </div>
      `;
    }

    function renderDrawer(team) {
      if (selectedVariant === "d") return renderVariantD(team);
      if (selectedVariant === "e") return renderVariantE(team);
      if (selectedVariant === "f") return renderVariantF(team);
      if (selectedVariant === "b") return renderVariantB(team);
      if (selectedVariant === "c") return renderVariantC(team);
      return renderVariantA(team);
    }

    function renderRows() {
      rows.innerHTML = teams.map((team, index) => `
        <tr>
          <td>${String(index + 1).padStart(2, "0")}</td>
          <td>
            <button class="team-name" type="button" data-team="${team.id}" style="--team: ${team.color}">
              <span class="team-dot"></span>
              ${team.name}
            </button>
          </td>
          <td>${team.cash}</td>
          <td>${team.car}</td>
          <td><span class="tag">${team.state}</span></td>
          <td>${team.points}</td>
        </tr>
      `).join("");

      document.querySelectorAll("[data-team]").forEach((button) => {
        button.addEventListener("dblclick", () => openDrawer(button.dataset.team));
        button.addEventListener("keydown", (event) => {
          if (event.key === "Enter") openDrawer(button.dataset.team);
        });
      });
    }

    function openDrawer(teamId) {
      const team = teams.find((item) => item.id === teamId) || teams[0];
      teamStripe.style.setProperty("--team", team.color);
      drawerContent.style.setProperty("--team", team.color);
      drawerContent.innerHTML = renderDrawer(team);
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
    }

    drawerContent.addEventListener("click", (event) => {
      const tab = event.target.closest("[data-archive-tab]");
      if (!tab) return;

      const target = tab.dataset.archiveTab;
      drawerContent.querySelectorAll("[data-archive-tab]").forEach((button) => {
        button.classList.toggle("active", button === tab);
      });
      drawerContent.querySelectorAll("[data-archive-panel]").forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.archivePanel === target);
      });
    });

    function close() {
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
    }

    document.querySelectorAll("[data-variant]").forEach((button) => {
      button.addEventListener("click", () => {
        selectedVariant = button.dataset.variant;
        document.querySelectorAll("[data-variant]").forEach((item) => {
          item.classList.toggle("active", item === button);
        });
      });
    });

    closeDrawer.addEventListener("click", close);
    backdrop.addEventListener("click", close);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") close();
    });

    renderRows();
  </script>
</body>
</html>
