<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip Opcao A - Emblema de Paddock</title>
  <style>
    :root { --accent: #e73f47; --accent-rgb: 231, 63, 71; --text: #edf4ff; --muted: #96a3b7; --panel: rgba(13, 19, 32, 0.94); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: var(--text); font-family: "Segoe UI", "Trebuchet MS", sans-serif; background: radial-gradient(circle at 50% 18%, rgba(var(--accent-rgb), .24), transparent 34%), linear-gradient(180deg, #050912, #09111d 52%, #05070d); }
    .page { width: min(1100px, calc(100vw - 32px)); padding: 28px 0 42px; }
    nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    nav a { color: var(--text); text-decoration: none; border: 1px solid rgba(255,255,255,.13); border-radius: 999px; padding: 9px 13px; background: rgba(255,255,255,.045); }
    nav a.active { border-color: rgba(var(--accent-rgb), .75); background: rgba(var(--accent-rgb), .18); }
    h1 { margin: 0 0 8px; font: 700 clamp(36px, 6vw, 76px)/.92 Georgia, serif; letter-spacing: -.055em; }
    .lead { max-width: 700px; margin: 0 0 32px; color: var(--muted); line-height: 1.55; }
    .tooltip { width: min(760px, 100%); margin: 0 auto; overflow: hidden; border: 1px solid rgba(255,255,255,.18); border-radius: 34px; background: var(--panel); box-shadow: 0 38px 110px rgba(0,0,0,.48); backdrop-filter: blur(22px); }
    .header { padding: 34px 34px 28px; text-align: center; background: radial-gradient(circle at 50% 38%, rgba(var(--accent-rgb), .34), transparent 48%), linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,0)); border-bottom: 1px solid rgba(255,255,255,.09); }
    .logo { width: min(620px, 100%); height: 280px; object-fit: contain; filter: drop-shadow(0 18px 42px rgba(var(--accent-rgb), .45)) drop-shadow(0 4px 14px rgba(0,0,0,.6)); }
    .content { padding: 24px; }
    .meta { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .pill { color: #fff; border: 1px solid rgba(var(--accent-rgb), .4); border-radius: 999px; padding: 7px 12px; background: rgba(var(--accent-rgb), .18); }
    .track { margin: 14px 0 0; font-size: 28px; font-weight: 900; letter-spacing: -.035em; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 18px; }
    .detail { padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.052); }
    .detail b { display: block; color: var(--muted); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
    .detail span { display: block; margin-top: 5px; font-size: 13px; font-weight: 850; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr 1fr; } .logo { height: 190px; } }
  </style>
</head>
<body>
  <main class="page">
    <nav>
      <a class="active" href="./2026-04-21-tooltip-option-a.html">Opcao A</a>
      <a href="./2026-04-21-tooltip-option-b.html">Opcao B</a>
      <a href="./2026-04-21-tooltip-option-c.html">Opcao C</a>
      <a href="./2026-04-21-tooltip-option-d.html">Opcao D</a>
      <a href="./2026-04-21-tooltip-option-e.html">Opcao E</a>
      <a href="./2026-04-21-other-category-tooltip-lab.html">Comparativo</a>
    </nav>
    <h1>Opcao A: emblema de paddock.</h1>
    <p class="lead">A versao mais direta: logo gigante no topo, dados abaixo. Otima para reconhecimento imediato da categoria.</p>
    <section class="tooltip">
      <div class="header"><img class="logo" src="../../../public/categorias/MX5%20CUP.png" alt="Mazda MX-5 Championship" /></div>
      <div class="content">
        <div class="meta"><span class="pill">R2</span><span>Mazda MX-5 Championship</span><span>25 min</span></div>
        <p class="track">Laguna Seca</p>
        <div class="grid">
          <div class="detail"><b>Categoria</b><span>Mazda Cup</span></div>
          <div class="detail"><b>Status</b><span>Pendente</span></div>
          <div class="detail"><b>Clima</b><span>A definir</span></div>
          <div class="detail"><b>Dia</b><span>Sexta</span></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
