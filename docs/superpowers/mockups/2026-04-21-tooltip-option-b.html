<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip Opcao B - Poster com Marca Dagua</title>
  <style>
    :root { --accent: #e73f47; --accent-rgb: 231, 63, 71; --text: #edf4ff; --muted: #96a3b7; --panel: rgba(13, 19, 32, .94); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: var(--text); font-family: "Segoe UI", "Trebuchet MS", sans-serif; background: radial-gradient(circle at 20% 10%, rgba(var(--accent-rgb), .2), transparent 32%), radial-gradient(circle at 90% 20%, rgba(54,113,198,.18), transparent 26%), linear-gradient(180deg, #050912, #09111d 52%, #05070d); }
    .page { width: min(1100px, calc(100vw - 32px)); padding: 28px 0 42px; }
    nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    nav a { color: var(--text); text-decoration: none; border: 1px solid rgba(255,255,255,.13); border-radius: 999px; padding: 9px 13px; background: rgba(255,255,255,.045); }
    nav a.active { border-color: rgba(var(--accent-rgb), .75); background: rgba(var(--accent-rgb), .18); }
    h1 { margin: 0 0 8px; font: 700 clamp(36px, 6vw, 76px)/.92 Georgia, serif; letter-spacing: -.055em; }
    .lead { max-width: 720px; margin: 0 0 32px; color: var(--muted); line-height: 1.55; }
    .tooltip { position: relative; width: min(760px, 100%); min-height: 500px; margin: 0 auto; overflow: hidden; padding: 34px; border: 1px solid rgba(255,255,255,.18); border-radius: 36px; background: var(--panel); box-shadow: 0 38px 110px rgba(0,0,0,.48); backdrop-filter: blur(22px); }
    .watermark { position: absolute; top: -38px; right: -108px; width: 560px; height: 330px; object-fit: contain; opacity: .14; transform: rotate(-9deg); filter: grayscale(.18); }
    .content { position: relative; z-index: 1; }
    .meta { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .pill { color: #fff; border: 1px solid rgba(var(--accent-rgb), .4); border-radius: 999px; padding: 7px 12px; background: rgba(var(--accent-rgb), .18); }
    .logo { display: block; width: min(500px, 100%); height: 250px; margin: 16px 0 10px -8px; object-fit: contain; filter: drop-shadow(0 18px 42px rgba(var(--accent-rgb), .45)) drop-shadow(0 4px 14px rgba(0,0,0,.6)); }
    .track { max-width: 520px; margin: 8px 0 0; font-size: 40px; font-weight: 950; line-height: .95; letter-spacing: -.055em; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 480px; margin-top: 22px; }
    .detail { padding: 13px; border-radius: 18px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.052); }
    .detail b { display: block; color: var(--muted); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
    .detail span { display: block; margin-top: 5px; font-size: 14px; font-weight: 850; }
    @media (max-width: 720px) { .tooltip { padding: 22px; } .logo { height: 190px; } .track { font-size: 30px; } }
  </style>
</head>
<body>
  <main class="page">
    <nav>
      <a href="./2026-04-21-tooltip-option-a.html">Opcao A</a>
      <a class="active" href="./2026-04-21-tooltip-option-b.html">Opcao B</a>
      <a href="./2026-04-21-tooltip-option-c.html">Opcao C</a>
      <a href="./2026-04-21-tooltip-option-d.html">Opcao D</a>
      <a href="./2026-04-21-tooltip-option-e.html">Opcao E</a>
      <a href="./2026-04-21-other-category-tooltip-lab.html">Comparativo</a>
    </nav>
    <h1>Opcao B: poster com marca d'agua.</h1>
    <p class="lead">Mais editorial: a logo principal fica grande e uma segunda logo aparece como textura no fundo.</p>
    <section class="tooltip">
      <img class="watermark" src="../../../public/categorias/MX5%20CUP.png" alt="" />
      <div class="content">
        <div class="meta"><span class="pill">R2</span><span>Mazda MX-5 Championship</span></div>
        <img class="logo" src="../../../public/categorias/MX5%20CUP.png" alt="Mazda MX-5 Championship" />
        <p class="track">Laguna Seca</p>
        <div class="grid">
          <div class="detail"><b>Duração</b><span>25 min</span></div>
          <div class="detail"><b>Clima</b><span>A definir</span></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
